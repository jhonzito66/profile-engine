    <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="3.2s" fill="freeze"/>
  </text>
  <text x="24" y="238" class="mono" font-size="12" fill="#9CA3AF" opacity="0">
    Python
    <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="3.5s" fill="freeze"/>
  </text>
  <text x="24" y="258" class="mono" font-size="12" fill="#9CA3AF" opacity="0">
    Flutter
    <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="3.8s" fill="freeze"/>
  </text>

  <text x="24" y="288" class="mono" font-size="13" fill="#6366F1" opacity="0">
    $
    <animate attributeName="opacity" from="0" to="1" dur="0.01s" begin="4.6s" fill="freeze"/>
  </text>
  <text x="40" y="288" class="mono" font-size="13" fill="#F9FAFB" opacity="0">
    current_project
    <animate attributeName="opacity" from="0" to="1" dur="0.01s" begin="4.6s" fill="freeze"/>
  </text>

  <text x="24" y="312" class="mono" font-size="13" fill="#818CF8" font-weight="600" opacity="0">
