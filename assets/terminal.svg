  </text>

  <rect x="24" y="322" width="8" height="14" fill="#6366F1" opacity="0">
    <animate attributeName="opacity" values="0;1;0;1" dur="1s" begin="5.699999999999999s" repeatCount="indefinite"/>
  </rect>
