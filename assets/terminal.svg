    <animate attributeName="opacity" from="0" to="1" dur="0.01s" begin="1.5s" fill="freeze"/>
  </text>
  <text x="40" y="112" class="mono" font-size="13" fill="#F9FAFB" opacity="0">
    stack
    <animate attributeName="opacity" from="0" to="1" dur="0.01s" begin="1.5s" fill="freeze"/>
  </text>

  <text x="24" y="138" class="mono" font-size="12" fill="#9CA3AF" opacity="0">
    Java
    <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="2s" fill="freeze"/>
  </text>
  <text x="24" y="158" class="mono" font-size="12" fill="#9CA3AF" opacity="0">
    Spring
    <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="2.3s" fill="freeze"/>
  </text>
  <text x="24" y="178" class="mono" font-size="12" fill="#9CA3AF" opacity="0">
