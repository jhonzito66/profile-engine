<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 248" width="680" height="248" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Terminal profile">
  <defs>
    <style>.m { font-family: Cascadia Code, Fira Code, Consolas, monospace; }</style>
  </defs>

  <rect width="680" height="248" rx="10" fill="#1A1A1A" stroke="#404040" stroke-width="1"/>
  <rect width="680" height="36" rx="10" fill="#2D2D2D"/>
  <rect y="26" width="680" height="10" fill="#2D2D2D"/>
  <circle cx="20" cy="18" r="6" fill="#EF4444"/>
  <circle cx="40" cy="18" r="6" fill="#F59E0B"/>
  <circle cx="60" cy="18" r="6" fill="#22C55E"/>
  <text x="90" y="22" class="m" font-size="11" fill="#A3A3A3">profile-engine — bash</text>
  <rect x="0" y="35" width="680" height="1" fill="#404040"/>

  <text x="24" y="62" class="m" font-size="13" fill="#F97316">$</text>
  <text x="42" y="62" class="m" font-size="13" fill="#FFFFFF">whoami</text>
  <text x="42" y="84" class="m" font-size="13" fill="#FFFFFF">João Pedro</text>

  <text x="24" y="112" class="m" font-size="13" fill="#F97316">$</text>
  <text x="42" y="112" class="m" font-size="13" fill="#FFFFFF">stack</text>
  <text x="42" y="134" class="m" font-size="12" fill="#A3A3A3">Java   Spring   Node   React</text>
  <text x="42" y="154" class="m" font-size="12" fill="#A3A3A3">TypeScript   Python   Flutter</text>

  <text x="24" y="182" class="m" font-size="13" fill="#F97316">$</text>
  <text x="42" y="182" class="m" font-size="13" fill="#FFFFFF">current_project</text>
  <text x="42" y="196" class="m" font-size="14" fill="#FB923C" font-weight="600">APKMyFinance</text>
  <rect x="42" y="207" width="9" height="16" fill="#F97316">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
