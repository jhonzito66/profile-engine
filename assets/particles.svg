<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="800" height="220" aria-hidden="true">
  <defs>
    <radialGradient id="particleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g opacity="0.35" stroke="#6366F1" stroke-width="0.5" fill="none">
    <line x1="80" y1="40" x2="160" y2="90"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="6s" repeatCount="indefinite"/></line>
    <line x1="160" y1="90" x2="240" y2="55"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="7s" repeatCount="indefinite"/></line>
    <line x1="240" y1="50" x2="320" y2="120"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="5s" repeatCount="indefinite"/></line>
    <line x1="320" y1="120" x2="420" y2="60"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="8s" repeatCount="indefinite"/></line>
    <line x1="420" y1="60" x2="520" y2="140"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="6.5s" repeatCount="indefinite"/></line>
    <line x1="520" y1="140" x2="620" y2="80"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="7.5s" repeatCount="indefinite"/></line>
    <line x1="620" y1="80" x2="720" y2="160"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="5.5s" repeatCount="indefinite"/></line>
    <line x1="100" y1="170" x2="200" y2="130"><animate attributeName="opacity" values="0.3;0.7;0.3" dur="6s" repeatCount="indefinite"/></line>
    <line x1="200" y1="130" x2="300" y2="190"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="8s" repeatCount="indefinite"/></line>
    <line x1="500" y1="190" x2="600" y2="110"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="7s" repeatCount="indefinite"/></line>
  </g>

  <g filter="url(#softGlow)">
    <circle cx="80" cy="40" r="2" fill="url(#particleGlow)"><animate attributeName="cy" values="40;44;40" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="160" cy="90" r="2.5" fill="url(#particleGlow)"><animate attributeName="cy" values="90;86;90" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="240" cy="50" r="2" fill="url(#particleGlow)"><animate attributeName="cx" values="240;243;240" dur="6s" repeatCount="indefinite"/></circle>
    <circle cx="320" cy="120" r="3" fill="url(#particleGlow)"><animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="420" cy="60" r="2" fill="url(#particleGlow)"><animate attributeName="cy" values="60;64;60" dur="4.5s" repeatCount="indefinite"/></circle>
    <circle cx="520" cy="140" r="2.5" fill="url(#particleGlow)"><animate attributeName="cx" values="520;517;520" dur="5.5s" repeatCount="indefinite"/></circle>
    <circle cx="620" cy="80" r="2" fill="url(#particleGlow)"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="720" cy="160" r="2" fill="url(#particleGlow)"><animate attributeName="cy" values="160;156;160" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="100" cy="170" r="1.5" fill="url(#particleGlow)"/>
    <circle cx="200" cy="130" r="2" fill="url(#particleGlow)"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="190" r="2" fill="url(#particleGlow)"/>
    <circle cx="500" cy="190" r="2.5" fill="url(#particleGlow)"><animate attributeName="cy" values="190;186;190" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="600" cy="110" r="2" fill="url(#particleGlow)"/>
  </g>
</svg>
